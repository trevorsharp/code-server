services:
  code-server:
    build: 
      context: ./setup
      args:
        USERNAME: sharp
        USER_UID: 501
        USER_GID: 20
    restart: unless-stopped
    container_name: code-server
    hostname: code-server
    environment:
      - OPENCODE_FORK=1
    ports:
      - "2222:22"
    volumes:
      - ./projects:/home/sharp/projects
      - ./workspaces:/home/sharp/workspaces
      - ./opencode:/home/sharp/opencode
      - ./data/ssh:/home/sharp/.ssh:ro
      - ./data/ssh-host:/etc/ssh/host_keys:ro
      - ./data/gitconfig:/home/sharp/.gitconfig:ro
      - ./data/git-data:/home/sharp/.git-data
      - ./data/vscode-server:/home/sharp/.vscode-server
      - ./data/gh:/home/sharp/.config/gh
      - ./data/opencode-config:/home/sharp/.config/opencode
      - ./data/opencode-storage:/home/sharp/.local/share/opencode
      - ./data/workspace-config:/home/sharp/.config/workspace
      - ./data/AGENTS.md:/home/sharp/.config/opencode/AGENTS.md:ro
      - ./data/skills:/home/sharp/.config/opencode/skills
      - ./data/code-server:/home/sharp/.config/code-server
      - ./data/code-server-settings.json:/home/sharp/.local/share/code-server/User/settings.json
      - ./data/code-server-extensions:/home/sharp/.local/share/code-server/extensions
      - ./data/code-server-login.css:/usr/lib/code-server/src/browser/pages/login.css:ro
    networks:
      - webserver

networks:
  webserver:
    external: true